}
var _standalone=window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone;
window._bbyQe=null;
window.addEventListener('beforeinstallprompt',function(e){
e.preventDefault();
window._bbyQe=e;
if(_standalone)return;
setTimeout(function(){
var el=document.getElementById('_tuJhI');
if(el)el.style.display='flex';
},1800);
});
window.addEventListener('appinstalled',function(){
var el=document.getElementById('_tuJhI');
if(el)el.style.display='none';
window._bbyQe=null;
});
var _isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
if(_isIOS&&!_standalone){
setTimeout(function(){
var el=document.getElementById('_iosHint');
if(el)el.style.display='flex';
},1800);
}
}
})();
</script>
</body>
